<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gestor de Tareas</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">
    
    <header class="bg-blue-700 dark:bg-blue-900 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">Mi Gestor de Tareas</h1>
        <button id="btn-dark-mode" class="bg-blue-600 dark:bg-blue-800 hover:bg-blue-500 px-4 py-2 rounded-lg font-medium transition">
            🌙 Modo Oscuro
        </button>
    </header>

    <div class="flex flex-col md:flex-row min-h-[calc(100vh-68px)]">

        <aside class="bg-slate-600 dark:bg-slate-800 text-slate-100 w-full md:w-64 p-6 shadow-inner">
            <h2 class="text-lg font-semibold mb-4">Menú</h2>
            <nav>
                <ul class="flex flex-col gap-3">
                    <li id="btn-todas" class="bg-slate-700 dark:bg-slate-700 p-3 rounded-lg cursor-pointer font-medium border border-slate-500 hover:bg-blue-600 hover:border-blue-600 hover:-translate-y-1 transition transform shadow hover:shadow-lg">Todas las tareas</li>
                    <li id="btn-completadas" class="bg-slate-700 dark:bg-slate-700 p-3 rounded-lg cursor-pointer font-medium border border-slate-500 hover:bg-blue-600 hover:border-blue-600 hover:-translate-y-1 transition transform shadow hover:shadow-lg">Completadas</li>
                    <li id="btn-pendientes" class="bg-slate-700 dark:bg-slate-700 p-3 rounded-lg cursor-pointer font-medium border border-slate-500 hover:bg-blue-600 hover:border-blue-600 hover:-translate-y-1 transition transform shadow hover:shadow-lg">Pendientes</li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-8">
            <div class="mb-8">
                <form id="mi Gestor de tareas" class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="entrada-tarea" placeholder="Escribe una nueva tarea..."
                           class="flex-1 p-3 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <button type="submit" class="bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-6 rounded-lg transition shadow-md">
                        Agregar
                    </button>
                </form>
            </div>

            <section class="flex flex-col gap-4" id="lista-tareas">
                </section>
        </main>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
