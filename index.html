<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas.exe - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    boxShadow: {
                        'retro': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'retro-dark': '4px 4px 0px 0px rgba(255,255,255,1)',
                    },
                    colors: {
                        retro: { yellow: '#FDE047', pink: '#F472B6', green: '#4ADE80', blue: '#60A5FA', darkBg: '#111827', darkCard: '#1F2937' }
                    }
                }
            }
        }
    </script>
    <style>
        .task-enter { animation: slideIn 0.2s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-retro:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px black !important; }
        body { transition: background-color 0.3s ease; font-family: monospace; }
        [contenteditable]:focus { background: #FDE047; color: black; outline: none; padding: 0 4px; }
    </style>
</head>
<body class="bg-retro-yellow dark:bg-retro-darkBg text-gray-900 dark:text-white min-h-screen p-4 md:p-10">
    <main class="max-w-xl mx-auto bg-white dark:bg-retro-darkCard border-4 border-black dark:border-white shadow-retro dark:shadow-retro-dark p-6">
        <header class="flex justify-between items-center mb-6 border-b-4 border-black dark:border-white pb-4">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Tareas.exe</h1>
            <button id="btn-dark" class="btn-retro border-4 border-black dark:border-white p-2 bg-retro-blue shadow-retro dark:shadow-retro-dark">🌙</button>
        </header>

        <form id="form-tarea" class="flex gap-2 mb-4">
            <input type="text" id="input-tarea" placeholder="Nueva tarea..." class="flex-1 border-4 border-black dark:border-white p-2 dark:bg-gray-700 outline-none shadow-[inset_3px_3px_0px_rgba(0,0,0,0.1)]">
            <button type="submit" class="btn-retro bg-retro-pink border-4 border-black dark:border-white px-4 font-bold shadow-retro dark:shadow-retro-dark">+</button>
        </form>

        <div class="flex flex-wrap gap-2 mb-6 text-xs font-bold">
            <input type="text" id="input-busqueda" placeholder="Buscar..." class="flex-1 border-2 border-black dark:border-white p-1 px-2 dark:bg-gray-800 outline-none">
            <div class="flex border-2 border-black dark:border-white overflow-hidden">
                <button class="filtro px-2 py-1 bg-retro-green border-r-2 border-black dark:border-white text-black" data-filter="todas">ALL</button>
                <button class="filtro px-2 py-1 bg-white dark:bg-gray-800 border-r-2 border-black dark:border-white" data-filter="pendientes">PENDIENTES</button>
                <button class="filtro px-2 py-1 bg-white dark:bg-gray-800" data-filter="completadas">DONE</button>
            </div>
            <button id="btn-orden" class="border-2 border-black dark:border-white px-2 py-1 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-colors">A-Z ↑</button>
        </div>
        <div id="lista-tareas" class="space-y-3"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
